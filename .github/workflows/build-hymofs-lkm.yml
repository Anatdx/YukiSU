name: Build LKM for HymoFS
on:
  workflow_call:
    inputs:
      hymofs_ref:
        description: "Override HymoFS git ref (branch/tag/commit); auto-selects dev on feat/hymofs* refs when empty"
        required: false
        default: ""
        type: string
      full_archs:
        description: "Reserved input; DDK workflow currently builds arm64 only"
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      hymofs_ref:
        description: "Override HymoFS git ref (branch/tag/commit); leave empty to auto-select"
        required: false
        default: ""
        type: string
      full_archs:
        description: "Reserved input; DDK workflow currently builds arm64 only"
        required: false
        default: false
        type: boolean
jobs:
  build-hymofs-lkm:
    strategy:
      fail-fast: false
      matrix:
        kmi:
          - android12-5.10
          - android13-5.10
          - android13-5.15
          - android14-5.15
          - android14-6.1
          - android15-6.6
          - android16-6.12
        arch:
          - arm64
    uses: ./.github/workflows/hymofs-lkm.yml
    secrets: inherit
    with:
      kmi: ${{ matrix.kmi }}
      arch: ${{ matrix.arch }}
      hymofs_ref: ${{ inputs.hymofs_ref || (startsWith(github.head_ref || github.ref_name, 'feat/hymofs') && 'dev' || 'main') }}
      ddk_release: '20251104'
