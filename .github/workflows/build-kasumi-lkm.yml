name: Build LKM for Kasumi
on:
  workflow_call:
    inputs:
      kasumi_ref:
        description: "Override Kasumi git ref (branch/tag/commit); auto-selects dev on feat/kasumi* refs when empty"
        required: false
        default: ""
        type: string
  workflow_dispatch:
    inputs:
      kasumi_ref:
        description: "Override Kasumi git ref (branch/tag/commit); leave empty to auto-select"
        required: false
        default: ""
        type: string
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-kasumi-lkm:
    strategy:
      fail-fast: false
      matrix:
        kmi:
          - android12-5.10
          - android13-5.10
          - android13-5.15
          - android14-5.15
          - android14-6.1
          - android15-6.6
          - android16-6.12
    uses: ./.github/workflows/kasumi-lkm.yml
    secrets: inherit
    with:
      kmi: ${{ matrix.kmi }}
      arch: arm64
      kasumi_ref: ${{ inputs.kasumi_ref || (startsWith(github.head_ref || github.ref_name, 'feat/hymofs') && 'dev' || 'main') }}
      ddk_release: '20260313'
