name: Build LKM for KernelSU
on:
  workflow_call:
    inputs:
      yukizygisk:
        description: 'Enable YukiZygisk kernel hooks'
        required: false
        default: false
        type: boolean
      yukizygisk_parts:
        description: 'YukiZygisk kernel hook parts: probe,nl,orch,ctl'
        required: false
        default: 'probe,nl,orch,ctl'
        type: string
  workflow_dispatch:
    inputs:
      yukizygisk:
        description: 'Enable YukiZygisk kernel hooks'
        required: false
        default: false
        type: boolean
      yukizygisk_parts:
        description: 'YukiZygisk kernel hook parts'
        required: false
        default: 'probe,nl,orch,ctl'
        type: string
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-lkm:
    strategy:
      fail-fast: false
      matrix:
        kmi:
          - android12-5.10
          - android13-5.10
          - android13-5.15
          - android14-5.15
          - android14-6.1
          - android15-6.6
          - android16-6.12
    uses: ./.github/workflows/ddk-lkm.yml
    secrets: inherit
    with:
      kmi: ${{ matrix.kmi }}
      ddk_release: '20260313'
      yukizygisk: ${{ inputs.yukizygisk }}
      yukizygisk_parts: ${{ inputs.yukizygisk_parts || 'probe,nl,orch,ctl' }}
