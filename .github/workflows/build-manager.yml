name: Build Manager

on:
  workflow_dispatch:
  push:
    branches: [ "main", "dev", "feat/yukizygisk" ]
    paths:
      - '.github/workflows/build-manager.yml'
      - '.github/workflows/build-lkm.yml'
      - '.github/workflows/ddk-lkm.yml'
      - '.github/workflows/ksud.yml'
      - '.github/workflows/ksuinit.yml'
      - '.github/workflows/su.yml'
      - '.github/workflows/yukizygisk.yml'
      - 'repack_apk.py'
      - 'manager/**'
      - 'kernel/**'
      - 'userspace/**'
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - '.github/workflows/build-manager.yml'
      - '.github/workflows/build-lkm.yml'
      - '.github/workflows/ddk-lkm.yml'
      - '.github/workflows/ksud.yml'
      - '.github/workflows/ksuinit.yml'
      - '.github/workflows/su.yml'
      - '.github/workflows/yukizygisk.yml'
      - 'repack_apk.py'
      - 'manager/**'
      - 'kernel/**'
      - 'userspace/**'
  workflow_call: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  generate-key:
    runs-on: ubuntu-latest
    outputs:
      keystore: ${{ steps.gen.outputs.keystore }}
      keystore_password: ${{ steps.gen.outputs.keystore_password }}
      key_password: ${{ steps.gen.outputs.key_password }}
    steps:
      - name: Generate temporary keystore
        id: gen
        run: |
          KEYSTORE_PASSWORD=$(openssl rand -hex 32)
          KEY_PASSWORD=$(openssl rand -hex 32)
          echo "keystore_password=$KEYSTORE_PASSWORD" >> "$GITHUB_OUTPUT"
          echo "key_password=$KEY_PASSWORD" >> "$GITHUB_OUTPUT"

          keytool -genkeypair \
            -alias ci-key \
            -keyalg RSA -keysize 2048 \
            -validity 1 \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -dname "CN=YukiSU CI Build" \
            -storetype JKS \
            -keystore ci-key.jks

          echo "keystore=$(base64 -w 0 ci-key.jks)" >> "$GITHUB_OUTPUT"

  build-lkm:
    uses: ./.github/workflows/build-lkm.yml
    secrets: inherit
    with:
      yukizygisk: true
      yukizygisk_parts: probe,nl,orch,ctl

  build-ksuinit:
    uses: ./.github/workflows/ksuinit.yml
    secrets: inherit
    with:
      target: aarch64-linux-android

  build-su:
    uses: ./.github/workflows/su.yml
    secrets: inherit
    with:
      target: aarch64-linux-android

  build-yukizygisk:
    uses: ./.github/workflows/yukizygisk.yml
    with:
      target: aarch64-linux-android

  build-ksud:
    needs: [build-lkm, build-ksuinit, build-su, build-yukizygisk]
    uses: ./.github/workflows/ksud.yml
    secrets: inherit
    with:
      target: aarch64-linux-android
      os: ubuntu-latest
      pack_yukizygisk: true

  build-manager:
    needs: [generate-key]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./manager

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine manager variant for telegram bot
        id: determine
        run: |
          echo "title=Manager" >> "$GITHUB_OUTPUT"
          echo "topicid=${{ vars.MESSAGE_THREAD_ID }}" >> "$GITHUB_OUTPUT"

      - name: Write key
        env:
          TEMP_KEYSTORE: ${{ needs.generate-key.outputs.keystore }}
          TEMP_KEYSTORE_PASSWORD: ${{ needs.generate-key.outputs.keystore_password }}
          TEMP_KEY_PASSWORD: ${{ needs.generate-key.outputs.key_password }}
          PROD_KEYSTORE: ${{ secrets.KEYSTORE }}
          PROD_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          PROD_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          PROD_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$PROD_KEYSTORE" ]; then
            {
              echo KEYSTORE_PASSWORD="$PROD_KEYSTORE_PASSWORD"
              echo KEY_ALIAS="$PROD_KEY_ALIAS"
              echo KEY_PASSWORD="$PROD_KEY_PASSWORD"
              echo KEYSTORE_FILE='key.jks'
            } >> gradle.properties
            echo "$PROD_KEYSTORE" | base64 -d > key.jks
          else
            {
              echo KEYSTORE_PASSWORD="$TEMP_KEYSTORE_PASSWORD"
              echo KEY_ALIAS='ci-key'
              echo KEY_PASSWORD="$TEMP_KEY_PASSWORD"
              echo KEYSTORE_FILE='ci-key.jks'
            } >> gradle.properties
            echo "$TEMP_KEYSTORE" | base64 -d > ci-key.jks
          fi

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build with Gradle
        if: ${{ steps.determine.outputs.SKIP != 'true' }}
        run: ./gradlew assembleRelease --build-cache --no-daemon -PABI=arm64-v8a

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: Manager-gradle-arm64-v8a
          path: manager/app/build/outputs/renamed_apk/release/

      - name: Upload mappings
        uses: actions/upload-artifact@v6
        with:
          name: "${{ steps.determine.outputs.title }}-mappings-arm64-v8a"
          path: "manager/app/build/outputs/mapping/release/"

  repack-manager:
    needs: [build-manager, build-ksud, generate-key]
    if: always() && needs.build-manager.result == 'success' && needs.build-ksud.result == 'success' && needs.generate-key.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup need_upload
        id: need_upload
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CAN_UPLOAD: ${{ github.event_name == 'push' && (github.ref_name == 'main' || startsWith(github.ref_name, 'feat/')) }}
        run: |
          if [ "$CAN_UPLOAD" = "true" ] && [ -n "$BOT_TOKEN" ]; then
            echo "UPLOAD=true" >> "$GITHUB_OUTPUT"
          else
            echo "UPLOAD=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine manager variant for telegram bot
        id: determine
        run: |
          echo "title=Manager" >> "$GITHUB_OUTPUT"
          echo "topicid=${{ vars.MESSAGE_THREAD_ID }}" >> "$GITHUB_OUTPUT"

      - name: Check nightly signing available
        id: gpg_check
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          PROD_KEYSTORE: ${{ secrets.KEYSTORE }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ] && [ -n "$PROD_KEYSTORE" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Require signing keys for main nightly
        if: github.ref_name == 'main' && steps.gpg_check.outputs.available != 'true'
        run: |
          echo 'Production APK and GPG signing keys are required for main nightly builds.' >&2
          exit 1

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download manager APK
        uses: actions/download-artifact@v7
        with:
          name: Manager-gradle-arm64-v8a
          path: artifacts/manager-gradle

      - name: Download ksud
        uses: actions/download-artifact@v7
        with:
          name: ksud-aarch64-linux-android
          path: artifacts/ksud-aarch64-linux-android

      - name: Place manager APK and ksud
        run: |
          set -euo pipefail
          mkdir -p manager/app/build/outputs/apk/release
          APK=$(find artifacts/manager-gradle -type f -name "*.apk" | head -n 1)
          test -n "$APK"
          cp -f "$APK" manager/app/build/outputs/apk/release/

          mkdir -p target/aarch64-linux-android/release
          KSUD=$(find artifacts/ksud-aarch64-linux-android -type f -name "ksud" | head -n 1)
          test -n "$KSUD"
          cp -f "$KSUD" target/aarch64-linux-android/release/ksud

      - name: Prepare signing inputs
        env:
          TEMP_KEYSTORE: ${{ needs.generate-key.outputs.keystore }}
          TEMP_KEYSTORE_PASSWORD: ${{ needs.generate-key.outputs.keystore_password }}
          TEMP_KEY_PASSWORD: ${{ needs.generate-key.outputs.key_password }}
          PROD_KEYSTORE: ${{ secrets.KEYSTORE }}
          PROD_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          PROD_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          PROD_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$PROD_KEYSTORE" ]; then
            echo "$PROD_KEYSTORE" | base64 -d > key.jks
            {
              echo "SIGN_KEYSTORE_FILE=key.jks"
              echo "SIGN_KEY_ALIAS=$PROD_KEY_ALIAS"
              echo "SIGN_KEYSTORE_PASSWORD=$PROD_KEYSTORE_PASSWORD"
              echo "SIGN_KEY_PASSWORD=$PROD_KEY_PASSWORD"
            } >> "$GITHUB_ENV"
          else
            echo "$TEMP_KEYSTORE" | base64 -d > ci-key.jks
            {
              echo "SIGN_KEYSTORE_FILE=ci-key.jks"
              echo "SIGN_KEY_ALIAS=ci-key"
              echo "SIGN_KEYSTORE_PASSWORD=$TEMP_KEYSTORE_PASSWORD"
              echo "SIGN_KEY_PASSWORD=$TEMP_KEY_PASSWORD"
            } >> "$GITHUB_ENV"
          fi

      - name: Repack and resign
        run: |
          python3 repack_apk.py repack \
            -b release \
            -t release \
            -a arm64-v8a \
            -K "$SIGN_KEYSTORE_FILE" \
            -A "$SIGN_KEY_ALIAS" \
            -P "$SIGN_KEYSTORE_PASSWORD" \
            -S "$SIGN_KEY_PASSWORD" \
            --strip

      - name: Import GPG key
        if: steps.gpg_check.outputs.available == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "$GPG_PRIVATE_KEY" > key.asc
          gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --import key.asc
          rm -f key.asc

      - name: Sign APK with GPG
        if: steps.gpg_check.outputs.available == 'true'
        run: |
          cd dist
          mapfile -t APKS < <(find . -maxdepth 1 -type f -name '*.apk')
          test "${#APKS[@]}" -eq 1
          TG_APK_NAME=$(basename -- "${APKS[0]}")
          echo "TG_APK_NAME=$TG_APK_NAME" >> "$GITHUB_ENV"
          if [[ "${APKS[0]}" != './app-release.apk' ]]; then
            mv -- "${APKS[0]}" app-release.apk
          fi
          gpg --detach-sign --local-user 'C09CE484EEA3F2D88E9CDCC8EBDB0D663D7AB2F6!' \
            --digest-algo SHA512 \
            --batch --yes --pinentry-mode loopback \
            --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
            --output app-release.sig app-release.apk
          test -s app-release.apk
          test -s app-release.sig

      - name: Upload build artifact
        if: steps.gpg_check.outputs.available == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: Manager-arm64-v8a
          path: dist/

      - name: Sign CI update metadata with GPG
        if: steps.gpg_check.outputs.available == 'true' && github.ref_name == 'main'
        env:
          CI_BRANCH: ${{ github.ref_name }}
          CI_COMMIT_SHA: ${{ github.sha }}
          CI_RUN_ID: ${{ github.run_id }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          mapfile -t MANAGER_APKS < <(find dist -maxdepth 1 -type f -name '*.apk')
          test "${#MANAGER_APKS[@]}" -eq 1
          MANAGER_APK=${MANAGER_APKS[0]}
          mkdir -p update-metadata
          if command -v apkanalyzer >/dev/null 2>&1; then
            CI_VERSION_CODE=$(apkanalyzer manifest version-code "$MANAGER_APK")
          else
            SDK_ROOT=${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}
            test -n "$SDK_ROOT"
            CI_VERSION_CODE=$("$SDK_ROOT/cmdline-tools/latest/bin/apkanalyzer" \
              manifest version-code "$MANAGER_APK")
          fi
          [[ "$CI_VERSION_CODE" =~ ^[0-9]+$ ]]
          export CI_COMMIT_MESSAGE
          export CI_VERSION_CODE
          CI_COMMIT_MESSAGE=$(git log -1 --pretty=%B)
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          metadata = {
              "schema_version": 1,
              "repository": "Anatdx/YukiSU",
              "workflow": "build-manager.yml",
              "branch": os.environ["CI_BRANCH"],
              "run_id": int(os.environ["CI_RUN_ID"]),
              "version_code": int(os.environ["CI_VERSION_CODE"]),
              "commit_sha": os.environ["CI_COMMIT_SHA"],
              "commit_message": os.environ["CI_COMMIT_MESSAGE"],
          }
          Path("update-metadata/ci-update.json").write_text(
              json.dumps(metadata, ensure_ascii=False, separators=(",", ":"), sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
          gpg --detach-sign --local-user 'C09CE484EEA3F2D88E9CDCC8EBDB0D663D7AB2F6!' \
            --digest-algo SHA512 \
            --batch --yes --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" \
            --output update-metadata/ci-update.sig update-metadata/ci-update.json
          test -s update-metadata/ci-update.json
          test -s update-metadata/ci-update.sig

      - name: Upload CI update metadata
        if: steps.gpg_check.outputs.available == 'true' && github.ref_name == 'main'
        uses: actions/upload-artifact@v6
        with:
          name: Manager-update-metadata
          path: update-metadata/

      - name: Prepare Cloudflare Pages update payload
        if: steps.gpg_check.outputs.available == 'true' && github.ref_name == 'main'
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import shutil
          import zipfile
          from pathlib import Path

          manager_apks = list(Path("dist").glob("*.apk"))
          if len(manager_apks) != 1:
              raise SystemExit(f"Expected one Manager APK, found {len(manager_apks)}")

          apk_signature = Path("dist/app-release.sig")
          if not apk_signature.is_file():
              raise SystemExit("Missing app-release.sig")

          payload = Path("pages-payload")
          payload.mkdir(exist_ok=True)
          shutil.copy2("update-metadata/ci-update.json", payload / "ci-update.json")
          shutil.copy2("update-metadata/ci-update.sig", payload / "ci-update.sig")
          with zipfile.ZipFile(
              payload / "Manager-arm64-v8a.zip",
              mode="w",
              compression=zipfile.ZIP_DEFLATED,
              compresslevel=9,
          ) as archive:
              archive.write(manager_apks[0], arcname="app-release.apk")
              archive.write(apk_signature, arcname="app-release.sig")
          PY
          mapfile -t PAGES_FILES < <(
            find pages-payload -mindepth 1 -maxdepth 1 -type f -printf '%f\n' | LC_ALL=C sort
          )
          test "${#PAGES_FILES[@]}" -eq 3
          test "${PAGES_FILES[0]}" = 'Manager-arm64-v8a.zip'
          test "${PAGES_FILES[1]}" = 'ci-update.json'
          test "${PAGES_FILES[2]}" = 'ci-update.sig'
          mapfile -t ARCHIVE_FILES < <(
            unzip -Z1 pages-payload/Manager-arm64-v8a.zip | LC_ALL=C sort
          )
          test "${#ARCHIVE_FILES[@]}" -eq 2
          test "${ARCHIVE_FILES[0]}" = 'app-release.apk'
          test "${ARCHIVE_FILES[1]}" = 'app-release.sig'
          test -s pages-payload/ci-update.json
          test -s pages-payload/ci-update.sig
          test "$(stat -c '%s' pages-payload/Manager-arm64-v8a.zip)" \
            -le $((25 * 1024 * 1024))

      - name: Deploy CI update payload to Cloudflare Pages
        if: steps.gpg_check.outputs.available == 'true' && github.ref_name == 'main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy pages-payload --project-name=yukisuupdates --branch=main

      - name: Restore APK filename for Telegram
        if: steps.gpg_check.outputs.available == 'true'
        run: |
          test -n "$TG_APK_NAME"
          if [[ "$TG_APK_NAME" != 'app-release.apk' ]]; then
            mv -- dist/app-release.apk "dist/$TG_APK_NAME"
          fi

      - name: Upload to telegram
        if: github.event_name == 'push' && (github.ref_name == 'main' || startsWith(github.ref_name, 'feat/')) && steps.need_upload.outputs.UPLOAD == 'true' && steps.determine.outputs.SKIP != 'true'
        env:
          CHAT_ID: ${{ vars.CHAT_ID }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          MESSAGE_THREAD_ID: ${{ steps.determine.outputs.topicid }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TITLE: ${{ steps.determine.outputs.title }}
          BRANCH: ${{ github.ref_name }}
        run: |
          if [ -n "$BOT_TOKEN" ]; then
            export VERSION
            VERSION=$(git rev-list --count HEAD)
            mapfile -t APKS < <(find ./dist -name "*.apk")
            pip3 install telethon
            python3 "$GITHUB_WORKSPACE/scripts/ksubot.py" "${APKS[@]}"
          fi
