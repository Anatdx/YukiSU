name: Build HymoFS Kernel Module

on:
  workflow_call:
    inputs:
      kmi:
        description: "KMI version"
        required: true
        type: string
      arch:
        description: "Target architecture (DDK currently supports arm64 only)"
        required: true
        type: string
      hymofs_ref:
        description: "HymoFS git ref (branch/tag/commit)"
        required: false
        default: "main"
        type: string
      ddk_release:
        description: "DDK release version"
        required: false
        default: "20251104"
        type: string

jobs:
  build:
    name: Build hymofs ${{ inputs.arch }} ${{ inputs.kmi }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ylarod/ddk:${{ inputs.kmi }}-${{ inputs.ddk_release }}
      options: --privileged
    env:
      OUT: ${{ github.workspace }}/out
      SRC_ROOT: ${{ github.workspace }}/hymofs_src
      SRC: ${{ github.workspace }}/hymofs_src/src

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate target arch
        run: |
          if [ "${{ inputs.arch }}" != "arm64" ]; then
            echo "DDK workflow currently supports arm64 only, got: ${{ inputs.arch }}"
            exit 1
          fi

      - name: Clone HymoFS
        run: |
          set -euo pipefail
          echo "Cloning HymoFS (ref: ${{ inputs.hymofs_ref }})..."
          git clone --depth 1 "https://github.com/Anatdx/HymoFS.git" "$SRC_ROOT"
          (
            cd "$SRC_ROOT"
            git fetch --depth 1 origin "${{ inputs.hymofs_ref }}"
            git checkout FETCH_HEAD
          )
          ls -la "$SRC/"

      - name: Generate version
        id: parse_version
        run: |
          COMMIT_NUM=$(cd "$SRC_ROOT" && git rev-list --count HEAD)
          VERSION=$((COMMIT_NUM + 200))
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build hymofs_lkm.ko
        run: |
          set -euo pipefail
          if [ -z "${KDIR:-}" ] || [ ! -f "$KDIR/Makefile" ]; then
            echo "KDIR is not available inside DDK container: ${KDIR:-<empty>}"
            exit 1
          fi

          VERSION="${{ steps.parse_version.outputs.VERSION }}"
          echo "Building hymofs_lkm.ko with KDIR=$KDIR"
          (
            cd "$SRC_ROOT"
            make -j"$(nproc --all)" CC=clang \
              CFLAGS_MODULE="-DHYMOFS_VERSION=\\\"0.1.${VERSION}\\\""
          )

          mkdir -p "$OUT"
          cp "$SRC/hymofs_lkm.ko" "$OUT/${{ inputs.kmi }}_${{ inputs.arch }}_hymofs_lkm.ko"
          llvm-strip -d "$OUT/${{ inputs.kmi }}_${{ inputs.arch }}_hymofs_lkm.ko" 2>/dev/null || true
          ls -la "$OUT/"

      - name: Install GPG
        run: |
          apt-get update
          apt-get install -y gnupg

      - name: Import GPG key and Sign hymofs_lkm.ko
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          if [ -z "${GPG_PRIVATE_KEY:-}" ]; then
            echo "GPG_PRIVATE_KEY not set, skipping signing."
            touch "$OUT/${{ inputs.kmi }}_${{ inputs.arch }}_hymofs_lkm.ko.asc"
            exit 0
          fi
          printf '%s\n' "$GPG_PRIVATE_KEY" > key.asc
          gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --import key.asc
          rm -f key.asc
          cd "$OUT"
          KO_FILE="${{ inputs.kmi }}_${{ inputs.arch }}_hymofs_lkm.ko"
          echo "Signing $KO_FILE..."
          gpg --detach-sign --local-user an@anatdx.com --batch --yes --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" \
            --output "${KO_FILE}.asc" "$KO_FILE"
          ls -lh "${KO_FILE}.asc"

      - name: Upload .ko
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.kmi }}-${{ inputs.arch }}-hymofs-lkm
          path: |
            ${{ env.OUT }}/${{ inputs.kmi }}_${{ inputs.arch }}_hymofs_lkm.ko
            ${{ env.OUT }}/${{ inputs.kmi }}_${{ inputs.arch }}_hymofs_lkm.ko.asc
