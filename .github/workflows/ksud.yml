name: Build ksud
on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
        description: "Target architecture: aarch64 only"
      os:
        required: false
        type: string
        default: ubuntu-latest
      pack_lkm:
        required: false
        type: boolean
        default: true
      pack_ksuinit:
        required: false
        type: boolean
        default: true
      pack_yukizygisk:
        required: false
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ${{ inputs.os }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Download artifacts
      uses: actions/download-artifact@v7
    
    - name: Prepare LKM files
      if: ${{ inputs.pack_lkm }}
      run: |
        set -euo pipefail
        mkdir -p ./userspace/ksud/assets
        cp android*-lkm/*_kernelsu.ko ./userspace/ksud/assets/ 2>/dev/null || true
    
    - name: Prepare ksuinit
      if: ${{ inputs.pack_ksuinit }}
      run: |
        mkdir -p ./userspace/ksud/assets
        if [ -f ksuinit-${{ inputs.target }}/ksuinit ]; then
          cp ksuinit-${{ inputs.target }}/ksuinit ./userspace/ksud/assets/
        fi

    - name: Prepare su
      run: |
        set -euo pipefail
        # su is built ahead of time by su.yml (like ksuinit) and arrives as an
        # artifact; stage it into assets/ before ksud is built. ksud does NOT
        # compile su. Fail loudly if it is missing rather than silently shipping
        # a ksud with no embedded su.
        mkdir -p ./userspace/ksud/assets
        if [ ! -f su-${{ inputs.target }}/su ]; then
          echo "::error::su artifact (su-${{ inputs.target }}/su) missing -- did build-su run?"
          exit 1
        fi
        cp su-${{ inputs.target }}/su ./userspace/ksud/assets/
        echo "su staged into ksud/assets:"; ls -lh ./userspace/ksud/assets/su

    - name: Determine target settings
      id: target
      run: |
        case "${{ inputs.target }}" in
          aarch64-linux-android|aarch64)
            echo "arch=aarch64" >> "$GITHUB_OUTPUT"
            echo "abi=arm64-v8a" >> "$GITHUB_OUTPUT"
            echo "android_target=aarch64-linux-android26" >> "$GITHUB_OUTPUT"
            ;;
          *)
            echo "YukiSU supports aarch64 only, got: ${{ inputs.target }}"
            exit 1
            ;;
        esac

    - name: Prepare YukiZygisk payload
      run: |
        set -euo pipefail
        if [ "${{ inputs.pack_yukizygisk }}" != "true" ]; then
          echo "YukiZygisk payload: disabled"
          exit 0
        fi
        artifact="yukizygisk-aarch64-linux-android"
        for asset in libzygisk.so libyukilinker.so libyukizncore.so; do
          if [ ! -f "$artifact/$asset" ]; then
            echo "::error::YukiZygisk artifact missing: $artifact/$asset"
            exit 1
          fi
        done

        mkdir -p ./userspace/ksud/assets
        cp "$artifact"/libzygisk.so "$artifact"/libyukilinker.so \
          "$artifact"/libyukizncore.so ./userspace/ksud/assets/
        echo "YukiZygisk payload staged into ksud/assets:"
        ls -lh ./userspace/ksud/assets/libzygisk.so \
          ./userspace/ksud/assets/libyukilinker.so \
          ./userspace/ksud/assets/libyukizncore.so

    # busybox is built into ksud (ndk-busybox multi-call); no standalone busybox in assets

    # - name: Install UPX
    #   run: |
    #     UPX_VERSION="4.2.4"
    #     wget -q "https://github.com/upx/upx/releases/download/v${UPX_VERSION}/upx-${UPX_VERSION}-amd64_linux.tar.xz"
    #     tar -xf "upx-${UPX_VERSION}-amd64_linux.tar.xz"
    #     sudo mv "upx-${UPX_VERSION}-amd64_linux/upx" /usr/local/bin/
    #     rm -rf "upx-${UPX_VERSION}-amd64_linux" "upx-${UPX_VERSION}-amd64_linux.tar.xz"
    #     upx --version | head -1

    - name: Build ksud
      run: |
        cd userspace/ksud
        mkdir -p build && cd build
        
        # Cross-compile using Android NDK toolchain
        TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
        export CC="$TOOLCHAIN/bin/${{ steps.target.outputs.android_target }}-clang"
        export CXX="$TOOLCHAIN/bin/${{ steps.target.outputs.android_target }}-clang++"
        export AR="$TOOLCHAIN/bin/llvm-ar"
        export RANLIB="$TOOLCHAIN/bin/llvm-ranlib"
        export STRIP="$TOOLCHAIN/bin/llvm-strip"
        
        cmake .. \
          -G Ninja \
          -DCMAKE_SYSTEM_NAME=Android \
          -DCMAKE_ANDROID_ARCH_ABI="${{ steps.target.outputs.abi }}" \
          -DCMAKE_ANDROID_NDK="$ANDROID_NDK_HOME" \
          -DCMAKE_C_COMPILER="$CC" \
          -DCMAKE_CXX_COMPILER="$CXX" \
          -DCMAKE_BUILD_TYPE=Release

        ninja
        
        # Show binary info
        ls -lh ksud
        file ksud
        if [ "${{ inputs.pack_yukizygisk }}" = "true" ]; then
          echo "Embedded YukiZygisk payload assets:"
          for asset in libzygisk.so libyukilinker.so libyukizncore.so; do
            if ! grep -F "{\"$asset\"" generated/assets_data.cpp >/dev/null; then
              echo "::error::Expected embedded YukiZygisk asset missing: $asset"
              exit 1
            fi
            echo "  $asset"
          done
        fi
    - name: Import GPG key
      env:
        GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      run: |
        mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
        echo "$GPG_PRIVATE_KEY" > key.asc
        gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --import key.asc
        rm -f key.asc

    - name: Sign ksud with GPG
      run: |
        cd userspace/ksud/build
        echo "Signing ksud..."
        gpg --detach-sign --local-user an@anatdx.com --batch --yes --pinentry-mode loopback \
          --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
          --output "ksud.sig" "ksud"
        if [ -f "ksud.sig" ]; then
          echo "Signature created successfully"
          ls -lh ksud.sig
        else
          echo "Error: Signature file not created!"
          exit 1
        fi

    - name: Upload ksud artifact
      uses: actions/upload-artifact@v6
      with:
        name: ksud-${{ inputs.target }}
        path: |
          userspace/ksud/build/ksud
          userspace/ksud/build/ksud.sig
