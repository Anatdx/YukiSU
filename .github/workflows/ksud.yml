name: Build ksud
on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
        description: "Target architecture: aarch64, x86_64, armv7"
      os:
        required: false
        type: string
        default: ubuntu-latest
      pack_lkm:
        required: false
        type: boolean
        default: true
      pack_ksuinit:
        required: false
        type: boolean
        default: true

jobs:
  build:
    runs-on: ${{ inputs.os }}
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Download artifacts
      uses: actions/download-artifact@v4
    
    - name: Prepare LKM files
      if: ${{ inputs.pack_lkm }}
      run: |
        set -euo pipefail
        mkdir -p ./userspace/ksud/assets
        cp android*-lkm/*_kernelsu.ko ./userspace/ksud/assets/ 2>/dev/null || true
        # HymoFS: copy only arch-matching .ko (arm64/armv7/x86_64)
        case "${{ inputs.target }}" in
          aarch64|aarch64-linux-android) arch_suffix="_arm64" ;;
          x86_64|x86_64-linux-android) arch_suffix="_x86_64" ;;
          armv7|armv7-linux-androideabi) arch_suffix="_armv7" ;;
          *) arch_suffix="_arm64" ;;
        esac
        mapfile -t hymofs_assets < <(find . -type f -name "android*${arch_suffix}_hymofs_lkm.ko" | sort)
        if [ "${#hymofs_assets[@]}" -gt 0 ]; then
          cp "${hymofs_assets[@]}" ./userspace/ksud/assets/
        fi
        echo "HymoFS assets copied into ksud/assets:"
        find ./userspace/ksud/assets -maxdepth 1 -type f -name "*${arch_suffix}_hymofs_lkm.ko" -print \
          | sed 's|^.*/||' | sort || true
        if [ "$arch_suffix" = "_arm64" ] && ! find ./userspace/ksud/assets -maxdepth 1 -type f \
          -name "android*${arch_suffix}_hymofs_lkm.ko" | grep -q .; then
          echo "::error::No KMI-tagged HymoFS assets were copied for ${arch_suffix}"
          echo "Downloaded HymoFS-related files:"
          find . -type f -name "*hymofs_lkm.ko" -print | sort || true
          exit 1
        fi
    
    - name: Prepare ksuinit
      if: ${{ inputs.pack_ksuinit }}
      run: |
        mkdir -p ./userspace/ksud/assets
        if [ -f ksuinit-${{ inputs.target }}/ksuinit ]; then
          cp ksuinit-${{ inputs.target }}/ksuinit ./userspace/ksud/assets/
        fi

    - name: Determine target settings
      id: target
      run: |
        case "${{ inputs.target }}" in
          aarch64-linux-android|aarch64)
            echo "arch=aarch64" >> $GITHUB_OUTPUT
            echo "abi=arm64-v8a" >> $GITHUB_OUTPUT
            echo "android_target=aarch64-linux-android26" >> $GITHUB_OUTPUT
            ;;
          x86_64-linux-android|x86_64)
            echo "arch=x86_64" >> $GITHUB_OUTPUT
            echo "abi=x86_64" >> $GITHUB_OUTPUT
            echo "android_target=x86_64-linux-android26" >> $GITHUB_OUTPUT
            ;;
          armv7-linux-androideabi|armv7)
            echo "arch=armv7" >> $GITHUB_OUTPUT
            echo "abi=armeabi-v7a" >> $GITHUB_OUTPUT
            echo "android_target=armv7a-linux-androideabi26" >> $GITHUB_OUTPUT
            ;;
          *)
            echo "Unknown target: ${{ inputs.target }}"
            exit 1
            ;;
        esac

    # busybox is built into ksud (ndk-busybox multi-call); no standalone busybox in assets

    # - name: Install UPX
    #   run: |
    #     UPX_VERSION="4.2.4"
    #     wget -q "https://github.com/upx/upx/releases/download/v${UPX_VERSION}/upx-${UPX_VERSION}-amd64_linux.tar.xz"
    #     tar -xf "upx-${UPX_VERSION}-amd64_linux.tar.xz"
    #     sudo mv "upx-${UPX_VERSION}-amd64_linux/upx" /usr/local/bin/
    #     rm -rf "upx-${UPX_VERSION}-amd64_linux" "upx-${UPX_VERSION}-amd64_linux.tar.xz"
    #     upx --version | head -1

    - name: Build ksud
      run: |
        cd userspace/ksud
        mkdir -p build && cd build
        
        # Cross-compile using Android NDK toolchain
        TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
        export CC=$TOOLCHAIN/bin/${{ steps.target.outputs.android_target }}-clang
        export CXX=$TOOLCHAIN/bin/${{ steps.target.outputs.android_target }}-clang++
        export AR=$TOOLCHAIN/bin/llvm-ar
        export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
        export STRIP=$TOOLCHAIN/bin/llvm-strip
        
        cmake .. \
          -G Ninja \
          -DCMAKE_SYSTEM_NAME=Android \
          -DCMAKE_ANDROID_ARCH_ABI=${{ steps.target.outputs.abi }} \
          -DCMAKE_ANDROID_NDK=$ANDROID_NDK_HOME \
          -DCMAKE_C_COMPILER=$CC \
          -DCMAKE_CXX_COMPILER=$CXX \
          -DCMAKE_BUILD_TYPE=Release

        ninja
        
        # Show binary info
        ls -lh ksud
        file ksud
        echo "Embedded HymoFS assets:"
        strings ksud | grep -F '_hymofs_lkm.ko' | sort -u || true
        case "${{ inputs.target }}" in
          aarch64-linux-android|aarch64)
            if ! strings ksud | grep -Eq '^android[0-9]+-[0-9]+\.[0-9]+_arm64_hymofs_lkm\.ko$'; then
              echo "::error::Expected KMI-tagged embedded HymoFS assets were not found in ksud"
              exit 1
            fi
            ;;
        esac

    - name: Import GPG key
      env:
        GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      run: |
        mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
        echo "$GPG_PRIVATE_KEY" > key.asc
        gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --import key.asc
        rm -f key.asc

    - name: Sign ksud with GPG
      run: |
        cd userspace/ksud/build
        echo "Signing ksud..."
        gpg --detach-sign --local-user an@anatdx.com --batch --yes --pinentry-mode loopback \
          --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
          --output "ksud.sig" "ksud"
        if [ -f "ksud.sig" ]; then
          echo "Signature created successfully"
          ls -lh ksud.sig
        else
          echo "Error: Signature file not created!"
          exit 1
        fi

    - name: Upload ksud artifact
      uses: actions/upload-artifact@v5
      with:
        name: ksud-${{ inputs.target }}
        path: |
          userspace/ksud/build/ksud
          userspace/ksud/build/ksud.sig
