name: Build su
on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
        description: "Target architecture: aarch64 only"
      os:
        required: false
        type: string
        default: ubuntu-latest
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ${{ inputs.os }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup NDK
      run: |
        echo "Using NDK from ANDROID_NDK_HOME: $ANDROID_NDK_HOME"

    - name: Determine target settings
      id: target
      run: |
        case "${{ inputs.target }}" in
          aarch64-linux-android|aarch64)
            echo "abi=arm64-v8a" >> "$GITHUB_OUTPUT"
            echo "android_target=aarch64-linux-android26" >> "$GITHUB_OUTPUT"
            ;;
          *)
            echo "YukiSU supports aarch64 only, got: ${{ inputs.target }}"
            exit 1
            ;;
        esac

    - name: Build su
      run: |
        cd userspace/su
        mkdir -p build && cd build

        TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
        export PATH="$TOOLCHAIN/bin:$PATH"
        export CC="$TOOLCHAIN/bin/${{ steps.target.outputs.android_target }}-clang"
        export CXX="$TOOLCHAIN/bin/${{ steps.target.outputs.android_target }}-clang++"
        export AR="$TOOLCHAIN/bin/llvm-ar"
        export RANLIB="$TOOLCHAIN/bin/llvm-ranlib"

        cmake .. \
          -G Ninja \
          -DCMAKE_SYSTEM_NAME=Android \
          -DCMAKE_ANDROID_ARCH_ABI=${{ steps.target.outputs.abi }} \
          -DCMAKE_ANDROID_NDK="$ANDROID_NDK_HOME" \
          -DCMAKE_C_COMPILER="$CC" \
          -DCMAKE_CXX_COMPILER="$CXX" \
          -DCMAKE_BUILD_TYPE=Release \
          -DYUKISU_ENABLE_CLANG_TIDY=OFF

        ninja

        # Show binary info
        ls -lh su
        file su

    - name: Import GPG key
      env:
        GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      run: |
        mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
        echo "$GPG_PRIVATE_KEY" > key.asc
        gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --import key.asc
        rm -f key.asc

    - name: Sign su with GPG
      run: |
        cd userspace/su/build
        echo "Signing su..."
        gpg --detach-sign --local-user an@anatdx.com --batch --yes --pinentry-mode loopback \
          --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
          --output "su.sig" "su"
        if [ -f "su.sig" ]; then
          echo "Signature created successfully"
          ls -lh su.sig
        else
          echo "Error: Signature file not created!"
          exit 1
        fi

    - name: Upload su artifact
      uses: actions/upload-artifact@v6
      with:
        name: su-${{ inputs.target }}
        path: |
          userspace/su/build/su
          userspace/su/build/su.sig
