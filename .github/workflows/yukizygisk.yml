name: Build YukiZygisk
on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
        description: "Target architecture: aarch64"
      os:
        required: false
        type: string
        default: ubuntu-latest
  workflow_dispatch:
    inputs:
      target:
        required: false
        type: choice
        default: aarch64-linux-android
        options:
          - aarch64-linux-android
      os:
        required: false
        type: string
        default: ubuntu-latest

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Determine target settings
        id: target
        run: |
          case "${{ inputs.target }}" in
            aarch64-linux-android|aarch64)
              echo "abi=arm64-v8a" >> "$GITHUB_OUTPUT"
              echo "android_target=aarch64-linux-android26" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "YukiZygisk currently supports aarch64 only, got: ${{ inputs.target }}"
              exit 1
              ;;
          esac

      - name: Build YukiZygisk payload
        run: |
          set -euo pipefail
          cd userspace/zygisk/core
          mkdir -p build
          cd build

          TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          export CC="$TOOLCHAIN/bin/${{ steps.target.outputs.android_target }}-clang"
          export CXX="$TOOLCHAIN/bin/${{ steps.target.outputs.android_target }}-clang++"
          export AR="$TOOLCHAIN/bin/llvm-ar"
          export RANLIB="$TOOLCHAIN/bin/llvm-ranlib"
          export STRIP="$TOOLCHAIN/bin/llvm-strip"

          cmake .. \
            -G Ninja \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_ANDROID_ARCH_ABI="${{ steps.target.outputs.abi }}" \
            -DCMAKE_ANDROID_NDK="$ANDROID_NDK_HOME" \
            -DCMAKE_C_COMPILER="$CC" \
            -DCMAKE_CXX_COMPILER="$CXX" \
            -DCMAKE_BUILD_TYPE=Release

          ninja
          ls -lh libzygisk.so libyukilinker.so libyukizncore.so
          file libzygisk.so libyukilinker.so libyukizncore.so

      - name: Upload YukiZygisk artifact
        uses: actions/upload-artifact@v6
        with:
          name: yukizygisk-${{ inputs.target }}
          path: |
            userspace/zygisk/core/build/libzygisk.so
            userspace/zygisk/core/build/libyukilinker.so
            userspace/zygisk/core/build/libyukizncore.so
